<h1 style="text-align: center;">Agendamento de Coleta</h1>

<form id="coletaForm">
    <label for="cliente">Nome do Cliente:</label>
    <input type="text" id="cliente" name="cliente" required>

    <label for="solicitante">Solicitante:</label>
    <input type="text" id="solicitante" name="solicitante" required>

    <label for="atendente">Atendente:</label>
    <input type="text" id="atendente" name="atendente" required>

    <label for="protocolo">Número de Protocolo:</label>
    <input type="text" id="protocolo" name="protocolo" required>

    <label for="notaFiscal">Nota Fiscal:</label>
    <input type="text" id="notaFiscal" name="notaFiscal">

    <label for="ordemServico">Ordem de Serviço:</label>
    <input type="text" id="ordemServico" name="ordemServico" required>

    <label for="observacao">Observação:</label>
    <input type="text" id="observacao" name="observacao">

    <label for="prazo">Prazo de Coleta:</label>
    <input type="date" id="prazo" name="prazo" required>

    <button type="submit">Agendar Coleta</button>
</form>

<div id="confirmacao"></div>
