<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema Ebenezer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <img src="EbenezerTitulo.png" alt="Ebenezer" class="login-logo">
    <h1>Acesso ao Sistema</h1>
    <p class="login-sub">Entre com suas credenciais para continuar</p>

    <form id="loginForm" onsubmit="fazerLogin(event)">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">

      <button type="submit" id="btnLogin">Entrar</button>
    </form>

    <div id="loginErro"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // Se já estiver logado, redireciona direto para a página certa
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) return;
      try {
        const snap = await db.collection('usuarios').where('email', '==', user.email).get();
        const perf = !snap.empty ? (snap.docs[0].data().perfil || 'consulta') : 'consulta';
        window.location.href = perf === 'admin' ? 'index.html' : 'consulta.html';
      } catch {
        window.location.href = 'consulta.html';
      }
    });

    async function fazerLogin(e) {
      e.preventDefault();
      const btn  = document.getElementById('btnLogin');
      const erro = document.getElementById('loginErro');
      btn.disabled    = true;
      btn.textContent = 'Entrando...';
      erro.innerHTML  = '';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      try {
        const cred  = await firebase.auth().signInWithEmailAndPassword(email, senha);
        const snap  = await db.collection('usuarios').where('email', '==', email).get();
        const perf  = !snap.empty ? (snap.docs[0].data().perfil || 'consulta') : 'consulta';
        window.location.href = perf === 'admin' ? 'index.html' : 'consulta.html';
      } catch (err) {
        let msg = 'E-mail ou senha incorretos.';
        if (err.code === 'auth/too-many-requests')
          msg = 'Muitas tentativas. Aguarde alguns minutos e tente novamente.';
        if (err.code === 'auth/user-disabled')
          msg = 'Esta conta foi desativada. Fale com o administrador.';
        erro.innerHTML      = `<p class="login-erro-msg">❌ ${msg}</p>`;
        btn.disabled        = false;
        btn.textContent     = 'Entrar';
      }
    }
  </script>

</body>
</html>
