<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Usuários — Ebenezer</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .usuarios-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .user-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .user-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
    }
    .user-info h3 { margin: 0 0 4px; color: #2d3748; }
    .user-info p { margin: 0; color: #718096; font-size: 14px; }
    .user-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .badge-admin { background: #fee2e2; color: #ef4444; }
    .badge-expedicao { background: #e0f2fe; color: #0ea5e9; }
    .badge-faturamento { background: #fef3c7; color: #d97706; }
    .badge-whatsapp { background: #dcfce7; color: #22c55e; }
    .badge-consulta { background: #f3f4f6; color: #6b7280; }

    .user-actions {
      margin-top: 20px;
      display: flex;
      gap: 8px;
    }
    .btn-action {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-reset { background: #edf2f7; color: #4a5568; }
    .btn-perfil { background: #6366f1; color: #fff; }
    .btn-delete { background: #fee2e2; color: #ef4444; width: 40px; flex: none; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-card {
      background: #fff; padding: 32px; border-radius: 20px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    .modal-card h2 { margin-top: 0; margin-bottom: 20px; font-size: 20px; }
    .modal-card label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #4a5568; }
    .modal-card input, .modal-card select {
      width: 100%; padding: 12px; margin-bottom: 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 15px;
    }
    .header-action {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <nav class="menu">
    <ul><!-- Preenchido pelo auth.js --></ul>
  </nav>

  <div class="container">
    <div class="header-action">
      <div>
        <h1 class="main-title">Gestão de Usuários</h1>
        <p class="sub-title">Controle quem acessa o sistema e seus níveis de permissão.</p>
      </div>
      <button class="btn-primary" onclick="abrirModalUsuario()">+ Novo Usuário</button>
    </div>

    <div id="listaUsuarios" class="usuarios-grid">
      <p style="text-align:center; color:#718096;">Carregando usuários...</p>
    </div>
  </div>

  <!-- Modal Adicionar/Editar Usuário -->
  <div id="modal-usuario" class="modal-overlay" onclick="fecharModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h2 id="modal-titulo">Novo Usuário</h2>
      <form id="formUsuario" onsubmit="salvarUsuario(event)">
        <label>Nome Completo:</label>
        <input type="text" id="user-nome" required placeholder="Ex: João Silva">
        
        <label>E-mail (Login):</label>
        <input type="email" id="user-email" required placeholder="usuario@email.com">
        
        <label>Perfil de Acesso:</label>
        <select id="user-perfil" required>
          <option value="consulta">Consulta (Apenas Leitura)</option>
          <option value="whatsapp">WhatsApp (Fechamento + Consulta)</option>
          <option value="faturamento">Faturamento (Aprovação + Consulta)</option>
          <option value="expedicao">Expedição (Etiquetas + Coletas)</option>
          <option value="admin">Administrador (Acesso Total)</option>
        </select>

        <div style="display:flex; gap:10px; margin-top:10px;">
          <button type="button" class="btn-secondary" style="flex:1" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn-primary" style="flex:1">Salvar</button>
        </div>
      </form>
      <p id="msg-informativa" style="font-size: 11px; color: #718096; margin-top: 15px; text-align: center;">
        * O usuário receberá um e-mail para definir sua senha no primeiro acesso.
      </p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="usuarios.js"></script>

</body>
</html>
